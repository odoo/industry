<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>beverage_distributor — Dependency Analyser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --white:#ffffff;
  --surface:#f8f9fa;
  --surface2:#f1f3f4;
  --surface3:#e8eaed;
  --border:#dadce0;
  --border-subtle:#e8eaed;

  --text:#202124;
  --text-secondary:#5f6368;
  --text-hint:#80868b;

  /* Google blue */
  --blue:#1a73e8;
  --blue-light:#e8f0fe;
  --blue-mid:#4285f4;

  /* Google green */
  --green:#188038;
  --green-light:#e6f4ea;

  /* Google red */
  --red:#d93025;
  --red-light:#fce8e6;

  /* Google yellow */
  --yellow:#f9ab00;
  --yellow-light:#fef7e0;

  /* Google teal (for auto-install) */
  --teal:#137333;
  --teal-light:#e6f4ea;

  /* Elevation shadows — Google material */
  --shadow-1:0 1px 2px rgba(60,64,67,.3),0 1px 3px 1px rgba(60,64,67,.15);
  --shadow-2:0 1px 2px rgba(60,64,67,.3),0 2px 6px 2px rgba(60,64,67,.15);
  --shadow-3:0 4px 8px 3px rgba(60,64,67,.15),0 1px 3px rgba(60,64,67,.3);
}

body{
  background:var(--surface);
  color:var(--text);
  font-family:'Google Sans','Segoe UI',sans-serif;
  font-size:13px;
  line-height:1.5;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ── Top bar — Google app bar style ── */
.topbar{
  background:var(--white);
  border-bottom:1px solid var(--border);
  padding:0 16px;
  height:56px;
  display:flex;
  align-items:center;
  gap:12px;
  flex-shrink:0;
  box-shadow:0 1px 3px rgba(60,64,67,.12);
}
.app-icon{
  width:32px;height:32px;border-radius:8px;
  background:var(--blue);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.app-icon svg{fill:#fff;width:18px;height:18px}
.module-name{
  font-size:16px;font-weight:500;color:var(--text);
  white-space:nowrap;flex-shrink:0;
}
.module-name span{color:var(--blue);font-weight:700}

/* Segmented control — Google-style pill toggle */
.seg-wrap{
  display:flex;background:var(--surface2);border:1px solid var(--border);
  border-radius:20px;overflow:hidden;flex-shrink:0;margin-left:8px;
}
.seg-wrap button{
  padding:6px 20px;border:none;background:transparent;
  color:var(--text-secondary);font-family:'Google Sans',sans-serif;
  font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;
  border-radius:20px;
}
.seg-wrap button.active{
  background:var(--blue-light);color:var(--blue);
  box-shadow:inset 0 0 0 1px var(--blue);
}
.seg-wrap button:hover:not(.active){background:var(--surface3);color:var(--text)}

/* Stats chips — Google chip style */
.stats-row{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap;align-items:center}
.stat-chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 12px;border-radius:16px;border:1px solid var(--border);
  background:var(--white);font-size:12px;color:var(--text-secondary);
  font-family:'Google Sans',sans-serif;font-weight:500;
}
.stat-chip .val{font-weight:700;font-size:13px}
.stat-chip.blue .val{color:var(--blue)}
.stat-chip.green .val{color:var(--green)}
.stat-chip.gray .val{color:var(--text-secondary)}
.stat-chip.red .val{color:var(--red)}
.stat-chip.teal .val{color:var(--teal)}

/* ── Search bar — Google search style ── */
.filterbar{
  background:var(--white);
  border-bottom:1px solid var(--border);
  padding:10px 16px;
  display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;
}
.search-wrap{
  display:flex;align-items:center;gap:8px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:24px;padding:6px 16px;flex:1;min-width:200px;
  transition:all .2s;
}
.search-wrap:focus-within{
  background:var(--white);border-color:var(--blue);
  box-shadow:0 0 0 2px rgba(26,115,232,.15);
}
.search-icon{width:16px;height:16px;flex-shrink:0;opacity:.5}
#search{
  border:none;background:transparent;color:var(--text);
  font-family:'Google Sans',sans-serif;font-size:13px;outline:none;flex:1;
}
#search::placeholder{color:var(--text-hint)}
#match-count{font-size:12px;color:var(--blue);font-weight:500;min-width:64px}

/* Filter chips — Google filter chip style */
.filter-chips{display:flex;gap:6px;flex-wrap:wrap}
.fchip{
  padding:5px 14px;border:1px solid var(--border);border-radius:16px;
  background:var(--white);color:var(--text-secondary);
  font-family:'Google Sans',sans-serif;font-size:12px;font-weight:500;
  cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:5px;
}
.fchip:hover{background:var(--surface2);border-color:var(--text-secondary)}
.fchip.on{background:var(--blue-light);border-color:var(--blue);color:var(--blue)}
.fchip.on::before{content:'✓ ';font-size:11px}

.ctrl-wrap{display:flex;gap:6px;margin-left:auto}
.text-btn{
  padding:6px 14px;border:none;border-radius:4px;background:transparent;
  color:var(--blue);font-family:'Google Sans',sans-serif;font-size:13px;
  font-weight:500;cursor:pointer;transition:background .15s;
}
.text-btn:hover{background:var(--blue-light)}

/* ── Main layout ── */
.main{display:flex;flex:1;overflow:hidden}

/* ── Tree panel ── */
.tree-panel{
  flex:1;overflow-y:auto;overflow-x:auto;padding:16px;min-width:0;
  background:var(--surface);
}
.tree-panel::-webkit-scrollbar{width:8px;height:8px}
.tree-panel::-webkit-scrollbar-track{background:transparent}
.tree-panel::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px;border:2px solid var(--surface)}
.tree-panel::-webkit-scrollbar-thumb:hover{background:var(--border)}

ul.tree{list-style:none;padding:0}
ul.tree ul{
  padding-left:24px;
  border-left:2px solid var(--surface3);
  margin:2px 0;
}
ul.tree ul.closed{display:none}
li.tree-item{padding:1px 0}
li.tree-item.hidden{display:none}

.node{
  display:inline-flex;align-items:center;gap:6px;
  padding:3px 10px;border-radius:20px;cursor:pointer;white-space:nowrap;
  transition:background .15s,box-shadow .15s;user-select:none;border:1px solid transparent;
}
.node:hover{background:var(--white);box-shadow:var(--shadow-1)}
.node.selected{background:var(--blue-light);border-color:rgba(26,115,232,.3);box-shadow:none}
.node.search-match{background:var(--yellow-light);border-color:rgba(249,171,0,.4)}
.node.search-dim{opacity:.25}

.caret{
  font-size:10px;width:12px;display:inline-block;
  transition:transform .15s;color:var(--text-hint);flex-shrink:0;
}
.node.collapsed .caret{ transform:rotate(0deg); }   /* right = collapsed */
.node:not(.collapsed) .caret{ transform:rotate(90deg); }  /* down = expanded */
.node.no-children .caret{visibility:hidden !important;}

/* Node label colors */
.node.direct   .nname{color:var(--blue);font-weight:600}
.node.auto     .nname{color:var(--teal);font-weight:500}
.node.trans    .nname{color:var(--text-secondary)}
.node.blacklisted .nname{color:var(--text-hint);text-decoration:line-through}
.node.selected .nname{color:var(--blue)!important}

/* Badges — Google chip style, small */
.nbadge{
  font-size:10px;padding:1px 7px;border-radius:10px;
  font-family:'Google Sans',sans-serif;font-weight:600;flex-shrink:0;
  letter-spacing:0.01em;
}
.nbadge.direct{background:var(--blue-light);color:var(--blue)}
.nbadge.auto{background:var(--teal-light);color:var(--teal)}
.nbadge.dominated{background:var(--red-light);color:var(--red)}
.ncount{font-size:11px;color:var(--text-hint);font-family:'Roboto Mono',monospace}

/* ── Detail panel — Material card feel ── */
.detail-panel{
  width:340px;flex-shrink:0;background:var(--white);
  border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;
}
.detail-panel::-webkit-scrollbar{width:6px}
.detail-panel::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}

.detail-empty{
  flex:1;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:10px;padding:24px;text-align:center;
}
.detail-empty-icon{
  width:48px;height:48px;border-radius:12px;background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
}
.detail-empty-icon svg{width:24px;height:24px;fill:var(--text-hint)}
.detail-empty p{color:var(--text-secondary);font-size:13px;line-height:1.6}

.detail-content{display:flex;flex-direction:column}

/* Detail header */
.detail-header{
  padding:16px 20px;border-bottom:1px solid var(--border-subtle);
  background:var(--white);
}
.detail-modname{
  font-size:14px;font-weight:700;color:var(--text);word-break:break-all;
  margin-bottom:8px;font-family:'Google Sans',sans-serif;
}
.detail-badges{display:flex;gap:5px;flex-wrap:wrap}
.dbadge{
  font-size:11px;padding:3px 10px;border-radius:12px;
  font-family:'Google Sans',sans-serif;font-weight:600;
}
.dbadge.direct{background:var(--blue-light);color:var(--blue)}
.dbadge.auto{background:var(--teal-light);color:var(--teal)}
.dbadge.dominated{background:var(--red-light);color:var(--red)}
.dbadge.blacklisted{background:var(--red-light);color:var(--red)}
.dbadge.inafter{background:var(--green-light);color:var(--green)}
.dbadge.notinafter{background:var(--red-light);color:var(--red)}

/* Detail sections */
.detail-section{padding:14px 20px;border-bottom:1px solid var(--border-subtle)}
.section-label{
  font-size:11px;font-weight:700;color:var(--text-hint);
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;
  font-family:'Google Sans',sans-serif;
}

/* Metric cards */
.metric-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.metric-card{
  background:var(--surface);border:1px solid var(--border-subtle);
  border-radius:12px;padding:12px;text-align:center;
}
.metric-val{font-size:22px;font-weight:700;color:var(--blue);font-family:'Google Sans',sans-serif}
.metric-lbl{font-size:11px;color:var(--text-secondary);margin-top:2px}

/* Path box */
.path-box{
  background:var(--surface);border:1px solid var(--border-subtle);
  border-radius:8px;padding:10px 14px;font-size:12px;line-height:2;
  font-family:'Roboto Mono',monospace;overflow-x:auto;
}
.path-node{color:var(--text);background:var(--white);padding:1px 6px;border-radius:4px;border:1px solid var(--border)}
.path-arrow{color:var(--text-hint);margin:0 4px;font-size:10px}

/* Redundancy alert — Google-style alert card */
.alert-card{
  background:var(--red-light);border:1px solid rgba(217,48,37,.2);
  border-radius:8px;padding:12px 14px;font-size:12px;color:#c5221f;
  line-height:1.7;
}
.alert-card strong{color:var(--red);font-weight:600}

/* Chip lists */
.chip-list{display:flex;flex-wrap:wrap;gap:5px}
.chip{
  font-size:11px;padding:3px 10px;border-radius:12px;
  border:1px solid var(--border);color:var(--text-secondary);
  cursor:pointer;transition:all .15s;background:var(--white);
  font-family:'Google Sans',sans-serif;
}
.chip:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
.chip.direct{background:var(--blue-light);border-color:rgba(26,115,232,.3);color:var(--blue)}
.chip.auto{background:var(--teal-light);border-color:rgba(19,115,51,.3);color:var(--teal)}

/* ── Bottom status bar ── */
.statusbar{
  background:var(--white);border-top:1px solid var(--border);
  padding:7px 20px;display:flex;align-items:center;gap:20px;
  flex-shrink:0;flex-wrap:wrap;
}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-secondary)}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.leg-dot.direct{background:var(--blue)}
.leg-dot.auto{background:var(--teal)}
.leg-dot.trans{background:var(--surface3);border:1px solid var(--border)}
.leg-dot.dominated{background:var(--red);border-radius:3px}
.leg-dot.cycle{background:var(--text-hint)}
</style>
</head>

<div class="topbar">
  <div class="app-icon">

  <div class="stats-row" id="stats-row"></div>
</div>

<div class="filterbar">
  <div class="search-wrap">

</div>

<div class="main">

  <div class="detail-panel" id="detail-panel">

        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14H7v-2h5v2zm5-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
      </div>
      <p>Click any module<br>to inspect details</p>
    </div>
  </div>
</div>

<div class="statusbar">
  <div class="leg-item"><div class="leg-dot direct"></div>Direct dependency</div>
  <div class="leg-item"><div class="leg-dot auto"></div>Auto-install</div>
  <div class="leg-item"><div class="leg-dot trans"></div>Transitive</div>
  <div class="leg-item"><div class="leg-dot dominated"></div>Redundant</div>
</div>

let mode='before', activeFilters=new Set(), selectedNode=null;
function cur(){return DATA[mode]}

function nodeClass(id){
  const m=cur().meta[id];
  if(!m) return 'trans';
  if(m.direct) return 'direct';
  if(m.auto)   return 'auto';
  if(m.blacklisted) return 'blacklisted';
  return 'trans';
}
function isDominated(id){return !!(cur().dominatedBy&&cur().dominatedBy[id])}

function renderStats(){
  const c=cur(), dominated=Object.keys(c.dominatedBy||{}).length;
  document.getElementById('stats-row').innerHTML=
    `<div class="stat-chip blue"><span class="val">${c.directCount}</span> direct</div>`+
    `<div class="stat-chip gray"><span class="val">${c.transCount}</span> transitive</div>`+
    `<div class="stat-chip teal"><span class="val">${c.autoCount}</span> auto-install</div>`+
    `<div class="stat-chip green"><span class="val">${c.totalCount}</span> total</div>`+
    (dominated?`<div class="stat-chip red"><span class="val">${dominated}</span> redundant</div>`:'');
}

function buildNode(nodeData){
  const{id,depth,cycle,children,hiddenChildCount}=nodeData;
  const li=document.createElement('li');
  li.className='tree-item'; li.dataset.id=id;
  const hasChildren=!cycle&&children&&children.length>0;
  const cls=nodeClass(id);
  const dominated=isDominated(id);

  const span=document.createElement('span');
  span.className='node '+cls+(hasChildren?' collapsed':' no-children');
  span.dataset.id=id;

  const caretEl=document.createElement('span');
  caretEl.className='caret'; caretEl.textContent='▶';

  const nameEl=document.createElement('span');
  nameEl.className='nname'; nameEl.textContent=id;

  span.appendChild(caretEl); span.appendChild(nameEl);

  if(depth===0&&cur().meta[id]?.direct){
    const b=document.createElement('span');
    b.className='nbadge direct'; b.textContent='direct'; span.appendChild(b);
  }
  if(cur().meta[id]?.auto){
    const b=document.createElement('span');
    b.className='nbadge auto'; b.textContent='auto'; span.appendChild(b);
  }
  if(dominated&&depth===0){
    const b=document.createElement('span');
    b.className='nbadge dominated'; b.textContent='redundant'; span.appendChild(b);
  }
  if(hasChildren){
    const cnt=document.createElement('span');
    cnt.className='ncount'; cnt.textContent=`(${children.length})`; span.appendChild(cnt);
  }

  li.appendChild(span);

  if(hasChildren){
    const ul=document.createElement('ul');
    ul.className='tree closed';
    children.forEach(child=>ul.appendChild(buildNode(child)));
    li.appendChild(ul);
    span.onclick=(e)=>{
      e.stopPropagation();
      const isClosed=ul.classList.toggle('closed');
      span.classList.toggle('collapsed',isClosed);
      handleNodeClick(id,span);
    };
  } else {
    span.onclick=(e)=>{e.stopPropagation();handleNodeClick(id,span)};
  }
  return li;
}

function renderTree(){
  const root=document.getElementById('tree-root');
  root.innerHTML='';
  cur().treeRoots.forEach(r=>root.appendChild(buildNode(r)));
}

function setAll(open){
  document.querySelectorAll('ul.tree ul').forEach(ul=>ul.classList.toggle('closed',!open));
  document.querySelectorAll('.node:not(.no-children)').forEach(n=>n.classList.toggle('collapsed',!open));
}

function switchMode(m){
  mode=m;
  document.getElementById('btn-before').classList.toggle('active',m==='before');
  document.getElementById('btn-after').classList.toggle('active',m==='after');
  activeFilters.clear();
  document.querySelectorAll('.fchip').forEach(b=>b.classList.remove('on'));
  document.getElementById('search').value='';
  document.getElementById('match-count').textContent='';
  renderStats(); renderTree();
  document.getElementById('detail-panel').innerHTML=`<div class="detail-empty">
    <div class="detail-empty-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14H7v-2h5v2zm5-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg></div>
    <p>Click any module<br>to inspect details</p></div>`;
  selectedNode=null;
}

function doSearch(q){
  q=q.trim().toLowerCase();
  const counter=document.getElementById('match-count');
  if(!q){
    document.querySelectorAll('.node').forEach(n=>n.classList.remove('search-match','search-dim'));
    document.querySelectorAll('.tree-item').forEach(li=>li.classList.remove('hidden'));
    counter.textContent=''; return;
  }
  let hits=0;
  document.querySelectorAll('.node').forEach(n=>{
    const match=(n.dataset.id||'').toLowerCase().includes(q);
    n.classList.toggle('search-match',match);
    n.classList.toggle('search-dim',!match);
    if(match) hits++;
  });
  document.querySelectorAll('.tree-item').forEach(li=>{
    const hasMatch=li.querySelector('.search-match');
    li.classList.toggle('hidden',!hasMatch);
    if(hasMatch){let p=li.parentElement;while(p){if(p.tagName==='UL')p.classList.remove('closed');p=p.parentElement}}
  });
  counter.textContent=hits?`${hits} result${hits>1?'s':''}`:'No results';
}
document.getElementById('search').addEventListener('keydown',e=>{if(e.key==='Escape'){e.target.value='';doSearch('')}});

function toggleFilter(f){
  const btn=document.getElementById('f-'+f);
  if(activeFilters.has(f)){activeFilters.delete(f);btn.classList.remove('on')}
  else{activeFilters.add(f);btn.classList.add('on')}
  applyFilters();
}
function applyFilters(){
  document.querySelectorAll('.tree-item').forEach(li=>{
    if(!activeFilters.size){li.classList.remove('hidden');return}
    const id=li.dataset.id, m=cur().meta[id]||{};
    let show=true;
    if(activeFilters.has('direct')&&!m.direct) show=false;
    if(activeFilters.has('auto')&&!m.auto) show=false;
    if(activeFilters.has('dominated')&&!isDominated(id)) show=false;
    li.classList.toggle('hidden',!show);
  });
}

function handleNodeClick(id,spanEl){
  if(selectedNode) selectedNode.classList.remove('selected');
  selectedNode=spanEl; spanEl.classList.add('selected');
  showDetail(id);
}

function showDetail(id){
  const m=cur().meta[id];
  const panel=document.getElementById('detail-panel');
  if(!m){
    panel.innerHTML=`<div class="detail-empty"><div class="detail-empty-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 15h2v2h-2zm0-8h2v6h-2zm.99-5C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/></svg></div><p>${id}<br><span style="color:var(--text-hint)">External module</span></p></div>`;
    return;
  }
  const dominated=cur().dominatedBy?.[id];
  const inAfter=DATA.after.depends.includes(id);
  const path=shortestPath(DATA.module,id,cur().treeRoots);
  const pathHtml=path.length>1
    ? path.map(p=>`<span class="path-node">${p}</span>`).join(`<span class="path-arrow">→</span>`)
    : `<span class="path-node">${id}</span>`;

  let html=`<div class="detail-content">`;

  // Header
  html+=`<div class="detail-header">
    <div class="detail-modname">${id}</div>
    <div class="detail-badges">`;
  if(m.direct)      html+=`<span class="dbadge direct">Direct dep</span>`;
  if(m.auto)        html+=`<span class="dbadge auto">Auto-install</span>`;
  if(m.blacklisted) html+=`<span class="dbadge blacklisted">Blacklisted</span>`;
  if(dominated)     html+=`<span class="dbadge dominated">Redundant</span>`;
  html+=`</div></div>`;

  // Metrics
  html+=`<div class="detail-section">
    <div class="section-label">Overview</div>
    <div class="metric-row">
      <div class="metric-card">
        <div class="metric-val">${m.depCount}</div>
        <div class="metric-lbl">direct deps</div>
      </div>
      <div class="metric-card">
        <div class="metric-val" style="color:var(--teal)">${m.refCount}</div>
        <div class="metric-lbl">required by</div>
      </div>
    </div>
  </div>`;

  

  // Redundancy alert
  if(dominated){
    html+=`<div class="detail-section">
      <div class="alert-card">
        <strong>Redundant dependency</strong><br>
        Already transitively covered by:<br>
        ${dominated.map(d=>`<b>${d}</b>`).join(', ')}<br>
        <span style="font-size:11px;opacity:.8;margin-top:4px;display:block">Safe to remove from depends[]</span>
      </div>
    </div>`;
  }

  // Requires
  if(m.directDeps.length){
    html+=`<div class="detail-section">
      <div class="section-label">Requires (${m.directDeps.length})</div>
      <div class="chip-list">
        ${m.directDeps.map(d=>{
          const dm=cur().meta[d]||{};
          const cls=dm.direct?'direct':dm.auto?'auto':'';
          return `<span class="chip ${cls}" onclick="jumpTo('${d}')">${d}</span>`;
        }).join('')}
      </div>
    </div>`;
  }

  // Required by
  if(m.reverseDeps.length){
    html+=`<div class="detail-section">
      <div class="section-label">Required by (${m.reverseDeps.length})</div>
      <div class="chip-list">
        ${m.reverseDeps.map(d=>{
          const dm=cur().meta[d]||{};
          const cls=dm.direct?'direct':dm.auto?'auto':'';
          return `<span class="chip ${cls}" onclick="jumpTo('${d}')">${d}</span>`;
        }).join('')}
      </div>
    </div>`;
  }

  html+=`</div>`;
  panel.innerHTML=html;
}

function shortestPath(root,target,treeRoots){
  if(root===target) return[root];
  const queue=[[root,[root],treeRoots]];
  while(queue.length){
    const[,path,children]=queue.shift();
    for(const node of children){
      const newPath=[...path,node.id];
      if(node.id===target) return newPath;
      if(!node.cycle&&node.children?.length) queue.push([node.id,newPath,node.children]);
    }
  }
  return[target];
}

function jumpTo(id){
  const span=document.querySelector(`.node[data-id="${id}"]`);
  if(span){span.scrollIntoView({behavior:'smooth',block:'center'});span.click()}
}

document.getElementById('module-title').textContent=DATA.module;
renderStats(); renderTree();
</script>
